
<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPhone Pro Landing</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
}

body{
background: radial-gradient(circle at top, #132228, #05080a);
color:#F5EED2;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:520px;
text-align:center;
}

h1{
font-size:30px;
margin-bottom:8px;
}

p{
opacity:0.6;
margin-bottom:25px;
}

h2{
margin:20px 0 10px;
color:#EBAE29;
font-size:16px;
letter-spacing:1px;
text-transform:uppercase;
}

/* CARDS */
.grid{
display:flex;
gap:12px;
flex-wrap:wrap;
justify-content:center;
}

.card{
flex:1;
min-width:140px;
padding:16px;
border-radius:16px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
cursor:pointer;
transition:0.25s;
backdrop-filter: blur(10px);
}

.card:hover{
transform:scale(1.05);
}

.active{
background:#EBAE29;
color:#132228;
font-weight:bold;
}

/* STORAGE PILLS */
.pill{
padding:12px 16px;
border-radius:999px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
cursor:pointer;
transition:0.25s;
}

.pill:hover{
transform:scale(1.05);
}

.pill.active{
background:#EBAE29;
color:#132228;
font-weight:bold;
}

/* BUTTON */
button{
margin-top:25px;
width:100%;
padding:16px;
border:none;
border-radius:16px;
background:#EBAE29;
color:#132228;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.25s;
}

button:hover{
transform:scale(1.03);
}

/* SUCCESS */
.success{
display:none;
margin-top:25px;
animation:fade 0.5s ease;
}

.check{
width:90px;
height:90px;
margin:auto;
border-radius:50%;
background:#EBAE29;
color:#132228;
display:flex;
align-items:center;
justify-content:center;
font-size:42px;
font-weight:bold;
}

.success h2{
color:#F5EED2;
margin-top:15px;
}

.success p{
opacity:0.6;
}

@keyframes fade{
from{opacity:0;transform:scale(0.8);}
to{opacity:1;transform:scale(1);}
}

/* MOBILE */
@media(max-width:600px){
.card{
min-width:100%;
}
}
</style>
</head>

<body>

<div class="container">

<h1>iPhone Experience</h1>
<p>Choose your perfect device</p>

<h2>Model</h2>
<div class="grid" id="models">
<div class="card active">iPhone 16</div>
<div class="card">iPhone 17</div>
</div>

<h2>Storage</h2>
<div class="grid" id="storage">
<div class="pill">128GB</div>
<div class="pill active">256GB</div>
<div class="pill">512GB</div>
</div>

<button onclick="order()">Order</button>

<div class="success" id="success">
<div class="check">✓</div>
<h2>Order Confirmed</h2>
<p>Your iPhone will be prepared shortly</p>
</div>

</div>

<script>
// MODEL SELECT
document.querySelectorAll("#models .card").forEach(el=>{
el.onclick = () => {
document.querySelectorAll("#models .card").forEach(i=>i.classList.remove("active"));
el.classList.add("active");
}
});

// STORAGE SELECT
document.querySelectorAll("#storage .pill").forEach(el=>{
el.onclick = () => {
document.querySelectorAll("#storage .pill").forEach(i=>i.classList.remove("active"));
el.classList.add("active");
}
});

// ORDER FUNCTION
function order(){

document.getElementById("success").style.display = "block";

// CONFETTI
confetti({
particleCount: 180,
spread: 90,
origin: { y: 0.6 }
});

// second burst
setTimeout(()=>{
confetti({
particleCount: 120,
spread: 70,
origin: { y: 0.4 }
});
},300);
}
</script>

</body>
</html>
